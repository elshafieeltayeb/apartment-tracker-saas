<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wohnungs-Tracker — Einstellungen</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4d;
        --text: #e8edf4;
        --muted: #8b9cb3;
        --accent: #3b82f6;
        --radius: 8px;
        --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 24px;
        line-height: 1.5;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      h2 {
        font-size: 15px;
        margin: 28px 0 8px;
        color: var(--muted);
        font-weight: 600;
      }
      p.hint {
        color: var(--muted);
        font-size: 14px;
        margin: 0 0 24px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 10px 12px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        padding: 10px 18px;
        border: none;
        border-radius: var(--radius);
        background: var(--accent);
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        filter: brightness(1.08);
      }
      #saved {
        margin-top: 12px;
        font-size: 13px;
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <h1>Einstellungen</h1>
    <p class="hint">
      Dashboard im Browser öffnen und optional Cloud-Sync mit API-Token aus den
      Web-Einstellungen.
    </p>
    <form id="form" novalidate>
      <h2>Dashboard</h2>
      <label for="dashboardUrl">Dashboard-URL</label>
      <input
        id="dashboardUrl"
        name="dashboardUrl"
        type="text"
        inputmode="url"
        placeholder="http://localhost:3000/dashboard"
        autocomplete="url"
      />

      <h2>Cloud-Sync (optional)</h2>
      <label for="apiBaseUrl">API-Basis-URL</label>
      <input
        id="apiBaseUrl"
        name="apiBaseUrl"
        type="text"
        inputmode="url"
        placeholder="http://localhost:3000/api/extension"
        autocomplete="off"
      />
      <p class="hint" style="margin-top: 8px; margin-bottom: 12px">
        Gleicher Wert wie unter Web → Einstellungen → Browser-Erweiterung.
      </p>
      <label for="apiToken">API-Token</label>
      <input
        id="apiToken"
        name="apiToken"
        type="password"
        placeholder="Token aus dem Web-Dashboard"
        autocomplete="off"
      />

      <button type="submit">Speichern</button>
    </form>
    <p id="saved" hidden>Gespeichert.</p>
    <script type="module" src="options.js"></script>
  </body>
</html>
